<!DOCTYPE html>

<head>

<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;background:#0b0907;color:#f1ece1;font-family:"Zen Kaku Gothic New",sans-serif;text-align:center;padding:40px 24px}

  .code{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:clamp(72px,16vw,180px);line-height:.9;letter-spacing:-.02em;color:#f1ece1;margin:0}

  .msg{font-size:clamp(14px,1.6vw,17px);line-height:2;font-weight:500;color:rgba(241,236,225,.72);margin:0;max-width:32em}

</style>
</head>
<body>
  <img src="/assets/mark.png" alt="Limaçon" style="width:72px;height:auto;display:block">
